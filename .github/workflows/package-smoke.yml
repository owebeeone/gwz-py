name: Package smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package-smoke:
    runs-on: macos-14

    steps:
      - name: Checkout gwz-py
        uses: actions/checkout@v4
        with:
          path: gwz-py

      - name: Checkout gwz-core
        uses: actions/checkout@v4
        with:
          repository: owebeeone/gwz-core
          path: gwz-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build prerequisites
        run: brew install openssl@3

      - name: Install Python build tools
        run: python -m pip install --upgrade pip maturin

      - name: Run package smoke
        working-directory: gwz-py
        run: python scripts/package_smoke.py
